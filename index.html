<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUB Leads Dashboard v0.2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e2e8f0;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --text: #1e293b;
    --muted: #64748b;
    --red: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* Header */
  .header { background: var(--text); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .version { background: rgba(255,255,255,.15); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .sync-time { font-size: 12px; color: rgba(255,255,255,.6); }
  .btn-sync { background: var(--primary); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sync:hover { background: #1d4ed8; }

  /* Filters */
  .filters { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
  .btn-group { display: flex; gap: 1px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .btn-group button { background: var(--card); border: none; padding: 6px 12px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .btn-group button:hover { background: var(--primary-light); color: var(--primary); }
  .btn-group button.active { background: var(--primary); color: #fff; font-weight: 600; }
  select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--text); background: var(--card); cursor: pointer; }
  select:focus { outline: none; border-color: var(--primary); }
  .filter-sep { width: 1px; height: 24px; background: var(--border); }

  /* Main layout */
  .main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Stats chips */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
  .stat-card .label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Recommendations */
  .recs-section { background: var(--green-light); border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
  .recs-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .recs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .rec-card { background: #fff; border: 1px solid #bbf7d0; border-radius: 6px; padding: 12px 14px; }
  .rec-rank { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .rec-main { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .rec-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .rec-action { font-size: 12px; font-weight: 600; color: var(--green); text-decoration: none; }
  .rec-action:hover { text-decoration: underline; }
  .recs-empty { font-size: 13px; color: var(--muted); }

  /* YGL inventory section */
  .ygl-section { background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
  .ygl-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .ygl-sub { font-size: 12px; color: #b45309; margin-bottom: 12px; }
  .ygl-table { width: 100%; border-collapse: collapse; }
  .ygl-table th { padding: 8px 10px; font-size: 12px; font-weight: 600; color: #92400e; text-align: center; background: #fef3c7; border-bottom: 1px solid #fde68a; }
  .ygl-table th:first-child { text-align: left; }
  .ygl-table td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid #fef9e0; text-align: center; }
  .ygl-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .ygl-table tr:last-child td { border-bottom: none; }
  .ygl-cell { border-radius: 4px; padding: 3px 8px; display: inline-block; min-width: 32px; font-weight: 600; }
  .ygl-0 { color: #d6d3d1; }
  .ygl-1 { background: #fef3c7; color: #92400e; }
  .ygl-2 { background: #fcd34d; color: #78350f; }
  .ygl-3 { background: #f59e0b; color: #fff; }
  .ygl-4 { background: #d97706; color: #fff; }

  /* Two-column layout */
  .two-col { display: grid; grid-template-columns: 1fr 360px; gap: 20px; margin-bottom: 20px; }

  /* Heat table */
  .heat-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .section-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--muted); }
  .heat-table { width: 100%; border-collapse: collapse; }
  .heat-table th { padding: 10px 12px; font-size: 12px; font-weight: 600; color: var(--muted); text-align: center; background: #f8fafc; border-bottom: 1px solid var(--border); }
  .heat-table th:first-child { text-align: left; }
  .heat-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; text-align: center; min-width: 70px; }
  .heat-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .heat-table tr:last-child td { border-bottom: none; }
  .heat-cell { border-radius: 4px; padding: 4px 8px; display: inline-block; min-width: 36px; font-weight: 600; }
  .heat-0 { color: #cbd5e1; }
  .heat-1 { background: #dbeafe; color: #1d4ed8; }
  .heat-2 { background: #93c5fd; color: #1e3a8a; }
  .heat-3 { background: #3b82f6; color: #fff; }
  .heat-4 { background: #1d4ed8; color: #fff; }

  /* By-agent panel */
  .agent-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .agent-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
  .agent-row:last-child { border-bottom: none; }
  .agent-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .agent-count { font-size: 13px; font-weight: 700; color: var(--primary); }
  .agent-bar-wrap { width: 80px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin: 0 10px; }
  .agent-bar { height: 100%; background: var(--primary); border-radius: 3px; }

  /* Lead cards */
  .cards-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .cards-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .lead-card { border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
  .lead-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .lead-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-agent { background: #e0e7ff; color: #3730a3; }
  .badge-nbhd { background: #fef3c7; color: #92400e; }
  .badge-beds { background: #f3f4f6; color: #374151; }
  .lead-date { font-size: 11px; color: var(--muted); margin-left: auto; }
  .lead-address { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .lead-price { font-size: 13px; color: var(--green); font-weight: 700; }
  .lead-name-text { font-size: 12px; color: var(--muted); }
  .lead-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .link-btn { font-size: 12px; font-weight: 600; color: var(--primary); text-decoration: none; white-space: nowrap; padding: 4px 10px; border: 1px solid var(--primary); border-radius: 4px; }
  .link-btn:hover { background: var(--primary); color: #fff; }
  .link-btn.zillow { border-color: #0068a5; color: #0068a5; }
  .link-btn.zillow:hover { background: #0068a5; color: #fff; }

  /* Pagination */
  .pagination { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .page-info { font-size: 13px; color: var(--muted); }
  .page-btns { display: flex; gap: 6px; }
  .page-btns button { border: 1px solid var(--border); background: var(--card); padding: 5px 12px; border-radius: 5px; font-size: 13px; cursor: pointer; }
  .page-btns button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
  .page-btns button:disabled { opacity: .4; cursor: default; }
  .page-btns button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Empty states */
  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .recs-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>FUB Leads Dashboard</h1>
    <span class="version">v0.2</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="sync-time" id="syncTime">Loading...</span>
  </div>
</div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Date</span>
    <div class="btn-group" id="dateButtons">
      <button onclick="setDate('yesterday')" class="active">Yesterday</button>
      <button onclick="setDate('7d')">7 Days</button>
      <button onclick="setDate('30d')">30 Days</button>
      <button onclick="setDate('all')">All Time</button>
    </div>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Agent</span>
    <select id="agentFilter" onchange="render()">
      <option value="">All Agents</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Neighborhood</span>
    <select id="nbhdFilter" onchange="render()">
      <option value="">All Neighborhoods</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Beds</span>
    <div class="btn-group" id="bedButtons">
      <button onclick="setBeds(null)" class="active">All</button>
      <button onclick="setBeds(0)">Studio</button>
      <button onclick="setBeds(1)">1BR</button>
      <button onclick="setBeds(2)">2BR</button>
      <button onclick="setBeds(3)">3BR+</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="root"><div class="loading">Loading lead data...</div></div>
</div>

<script>
const PAGE_SIZE = 25;
let allLeads = [];
let allYGL   = [];
let currentDate = 'yesterday';
let currentBeds = null;
let currentPage = 1;

// ── Utilities ────────────────────────────────────────────────────────────────

function bedsLabel(beds) {
  if (beds === null || beds === undefined) return '?';
  if (beds === 0) return 'Studio';
  if (beds >= 3) return beds + 'BR+';
  return beds + 'BR';
}

function fmtPrice(price) {
  if (!price) return null;
  return '$' + price.toLocaleString() + '/mo';
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00'); // noon to avoid DST shifts
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function localDateStr(d) {
  // Use local calendar date (not UTC) to match Eastern-time lead dates
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function yesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return localDateStr(d);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return localDateStr(d);
}

function searchZillowUrl(address) {
  return 'https://www.google.com/search?q=' + encodeURIComponent((address || '') + ' zillow');
}

// ── Filtering ─────────────────────────────────────────────────────────────────

function getFilteredLeads() {
  const agentVal = document.getElementById('agentFilter').value;
  const nbhdVal  = document.getElementById('nbhdFilter').value;

  let minDate = null;
  if (currentDate === 'yesterday') minDate = yesterday();
  else if (currentDate === '7d') minDate = daysAgo(7);
  else if (currentDate === '30d') minDate = daysAgo(30);

  return allLeads.filter(l => {
    if (minDate && l.date < minDate) return false;
    if (currentDate === 'yesterday' && l.date !== yesterday()) return false;
    if (agentVal && l.agent !== agentVal) return false;
    if (nbhdVal && l.neighborhood !== nbhdVal) return false;
    if (currentBeds !== null) {
      if (currentBeds === 3) { if (l.beds === null || l.beds < 3) return false; }
      else { if (l.beds !== currentBeds) return false; }
    }
    return true;
  });
}

function getYesterdayLeads() {
  const yest = yesterday();
  return allLeads.filter(l => l.date === yest);
}

// ── Render ─────────────────────────────────────────────────────────────────────

function renderStats(leads) {
  const total = leads.length;
  const agents = new Set(leads.map(l => l.agent).filter(Boolean));
  const nbhds = {};
  leads.forEach(l => { if (l.neighborhood) nbhds[l.neighborhood] = (nbhds[l.neighborhood] || 0) + 1; });
  const topNbhd = Object.entries(nbhds).sort((a, b) => b[1] - a[1])[0];
  const prices = leads.map(l => l.price).filter(Boolean);
  const avgPrice = prices.length ? Math.round(prices.reduce((s, p) => s + p, 0) / prices.length) : null;

  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Leads</div>
        <div class="value">${total}</div>
        <div class="sub">${currentDate === 'yesterday' ? 'yesterday' : currentDate === '7d' ? 'last 7 days' : currentDate === '30d' ? 'last 30 days' : 'all time'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Agents</div>
        <div class="value">${agents.size}</div>
        <div class="sub">${agents.size === 1 ? '1 agent received leads' : agents.size + ' agents received leads'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Top Neighborhood</div>
        <div class="value" style="font-size:18px;line-height:1.2;">${topNbhd ? topNbhd[0] : '—'}</div>
        <div class="sub">${topNbhd ? topNbhd[1] + ' leads' : 'no data'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Price</div>
        <div class="value">${avgPrice ? fmtPrice(avgPrice) : '—'}</div>
        <div class="sub">${prices.length ? 'from ' + prices.length + ' listings' : 'no price data yet'}</div>
      </div>
    </div>`;
}

function renderRecommendations() {
  const leads = getYesterdayLeads();
  if (!leads.length) {
    return `<div class="recs-section">
      <div class="recs-title">💡 Recommended Ad Opportunities for Today</div>
      <div class="recs-empty">No leads found for yesterday. Check back after the next sync.</div>
    </div>`;
  }

  // Only use leads that have an actual neighborhood (listing-specific inquiries)
  const locLeads = leads.filter(l => l.neighborhood);

  if (!locLeads.length) {
    // No location data → fall back to top agents by volume
    const agentCounts = {};
    leads.forEach(l => { if (l.agent) agentCounts[l.agent] = (agentCounts[l.agent] || 0) + 1; });
    const topAgents = Object.entries(agentCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const agentCards = topAgents.map(([agent, count], i) => `
      <div class="rec-card">
        <div class="rec-rank">${['#1', '#2', '#3'][i]}</div>
        <div class="rec-main">${agent}</div>
        <div class="rec-sub">${count} lead${count !== 1 ? 's' : ''} yesterday</div>
        <span style="font-size:11px;color:var(--muted);">No listing data — general inquiry leads</span>
      </div>`).join('');
    return `<div class="recs-section">
      <div class="recs-title">💡 Yesterday's Lead Volume by Agent</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Neighborhood/beds data is only captured when a renter inquires on a specific Zillow listing. Yesterday's leads were general inquiries without listing data.</div>
      <div class="recs-grid">${agentCards}</div>
    </div>`;
  }

  // Has location data — show neighborhood × beds recommendations
  const groups = {};
  locLeads.forEach(l => {
    const key = `${l.neighborhood}|${l.beds !== null ? l.beds : '?'}`;
    if (!groups[key]) groups[key] = { neighborhood: l.neighborhood, beds: l.beds, prices: [], count: 0 };
    groups[key].count++;
    if (l.price) groups[key].prices.push(l.price);
  });

  const sorted = Object.values(groups).sort((a, b) => b.count - a.count).slice(0, 3);
  const cards = sorted.map((g, i) => {
    const avgPr = g.prices.length ? Math.round(g.prices.reduce((s, p) => s + p, 0) / g.prices.length) : null;
    const label = ['#1 Pick', '#2 Pick', '#3 Pick'][i];
    const bedsStr = bedsLabel(g.beds);
    const priceStr = avgPr ? ` · avg ${fmtPrice(avgPr)}` : '';
    return `
      <div class="rec-card">
        <div class="rec-rank">${label}</div>
        <div class="rec-main">${bedsStr} in ${g.neighborhood}</div>
        <div class="rec-sub">${g.count} lead${g.count !== 1 ? 's' : ''} yesterday${priceStr}</div>
      </div>`;
  }).join('');

  return `<div class="recs-section">
    <div class="recs-title">💡 Recommended Ad Opportunities for Today</div>
    <div class="recs-grid">${cards}</div>
  </div>`;
}

const BEDS_COLS = [
  { key: 'studio', label: 'Studio', match: b => b === 0 },
  { key: '1br',    label: '1BR',    match: b => b === 1 },
  { key: '2br',    label: '2BR',    match: b => b === 2 },
  { key: '3br',    label: '3BR+',   match: b => b !== null && b >= 3 },
  // 'Unknown' beds column intentionally omitted — not actionable for ad targeting
];

function heatClass(count, max) {
  if (!count) return 'heat-0';
  const pct = max ? count / max : 0;
  if (pct < 0.2) return 'heat-1';
  if (pct < 0.5) return 'heat-2';
  if (pct < 0.8) return 'heat-3';
  return 'heat-4';
}

function yglHeatClass(count, max) {
  if (!count) return 'ygl-0';
  const pct = max ? count / max : 0;
  if (pct < 0.2) return 'ygl-1';
  if (pct < 0.5) return 'ygl-2';
  if (pct < 0.8) return 'ygl-3';
  return 'ygl-4';
}

function renderYGLSection() {
  if (!allYGL.length) return '';

  // Build neighborhood × beds matrix from YGL listings
  const matrix = {};
  let maxVal = 0;
  allYGL.forEach(l => {
    if (!l.neighborhood) return;
    if (!matrix[l.neighborhood]) matrix[l.neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(l.beds)) {
        matrix[l.neighborhood][col.key] = (matrix[l.neighborhood][col.key] || 0) + 1;
        maxVal = Math.max(maxVal, matrix[l.neighborhood][col.key]);
      }
    });
  });

  const nbhds = Object.keys(matrix).sort();
  if (!nbhds.length) return '';

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key]));
  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const cnt = matrix[n]?.[c.key] || 0;
      return `<td>${cnt ? `<span class="ygl-cell ${yglHeatClass(cnt, maxVal)}">${cnt}</span>` : '<span class="ygl-0">—</span>'}</td>`;
    }).join('');
    const total = cols.reduce((s, c) => s + (matrix[n]?.[c.key] || 0), 0);
    return `<tr><td>${n} <span style="color:var(--muted);font-weight:400;">(${total})</span></td>${cells}</tr>`;
  }).join('');

  const noFeeCount = allYGL.filter(l => l.fee === false || l.fee === 'No').length;
  const bostanOnly = allYGL.filter(l => l.neighborhood).length;

  return `<div class="ygl-section">
    <div class="ygl-title">📋 Available Inventory (YGL)</div>
    <div class="ygl-sub">${allYGL.length} on-market listings · ${bostanOnly} in Boston metro · ${noFeeCount} no-fee · updated at last sync</div>
    <table class="ygl-table">
      <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderHeatTable(leads) {
  const nbhds = [...new Set(leads.map(l => l.neighborhood).filter(Boolean))].sort();
  if (!nbhds.length) return '<div class="empty" style="padding:24px;">No neighborhood data for this date range.<br><span style="font-size:12px;">Location is only captured when a renter inquires on a specific Zillow listing.</span></div>';

  // Build count matrix
  const matrix = {};
  let maxVal = 0;
  leads.forEach(l => {
    if (!l.neighborhood) return;
    if (!matrix[l.neighborhood]) matrix[l.neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(l.beds)) {
        matrix[l.neighborhood][col.key] = (matrix[l.neighborhood][col.key] || 0) + 1;
        maxVal = Math.max(maxVal, matrix[l.neighborhood][col.key]);
      }
    });
  });

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key]));

  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const cnt = matrix[n]?.[c.key] || 0;
      return `<td>${cnt ? `<span class="heat-cell ${heatClass(cnt, maxVal)}">${cnt}</span>` : '<span class="heat-0">—</span>'}</td>`;
    }).join('');
    const total = cols.reduce((s, c) => s + (matrix[n]?.[c.key] || 0), 0);
    return `<tr><td>${n} <span style="color:var(--muted);font-weight:400;">(${total})</span></td>${cells}</tr>`;
  }).join('');

  return `<table class="heat-table">
    <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderAgentBreakdown(leads) {
  const counts = {};
  leads.forEach(l => { if (l.agent) counts[l.agent] = (counts[l.agent] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const max = sorted[0]?.[1] || 1;

  if (!sorted.length) return '<div class="empty" style="padding:20px;">No agent data.</div>';

  return sorted.map(([agent, count]) => `
    <div class="agent-row">
      <span class="agent-name">${agent}</span>
      <div class="agent-bar-wrap"><div class="agent-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="agent-count">${count}</span>
    </div>`).join('');
}

function renderLeadCards(leads) {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = leads.slice(start, start + PAGE_SIZE);

  if (!page.length) return '<div class="empty">No leads match the current filters.</div>';

  return page.map(l => {
    const bedsStr = l.beds !== null ? bedsLabel(l.beds) : null;
    const priceStr = fmtPrice(l.price);
    const actionBtn = l.zillow_url
      ? `<a class="link-btn zillow" href="${l.zillow_url}" target="_blank">View Listing →</a>`
      : `<a class="link-btn" href="${searchZillowUrl(l.address)}" target="_blank">Search Zillow →</a>`;

    return `
      <div class="lead-card">
        <div>
          <div class="lead-top">
            ${l.agent ? `<span class="badge badge-agent">${l.agent}</span>` : ''}
            ${l.neighborhood ? `<span class="badge badge-nbhd">${l.neighborhood}</span>` : ''}
            ${bedsStr ? `<span class="badge badge-beds">${bedsStr}</span>` : ''}
            <span class="lead-date">${fmtDate(l.date)}</span>
          </div>
          <div class="lead-address">${l.address || 'Address not available'}</div>
          <div style="display:flex;gap:12px;align-items:center;margin-top:3px;">
            ${priceStr ? `<span class="lead-price">${priceStr}</span>` : ''}
            ${l.lead_name ? `<span class="lead-name-text">${l.lead_name}</span>` : ''}
          </div>
        </div>
        <div class="lead-actions">${actionBtn}</div>
      </div>`;
  }).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) return '';

  const info = `${(currentPage - 1) * PAGE_SIZE + 1}–${Math.min(currentPage * PAGE_SIZE, total)} of ${total}`;
  const prev = `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
  const next = `<button onclick="goPage(${currentPage + 1})" ${currentPage >= pages ? 'disabled' : ''}>Next →</button>`;

  // Show up to 5 page buttons
  const pageNums = [];
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(pages, start + 4);
  for (let i = start; i <= end; i++) {
    pageNums.push(`<button onclick="goPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`);
  }

  return `<div class="pagination">
    <span class="page-info">${info}</span>
    <div class="page-btns">${prev}${pageNums.join('')}${next}</div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────

function render() {
  const leads = getFilteredLeads();
  const root  = document.getElementById('root');

  const statsHtml  = renderStats(leads);
  const recsHtml   = renderRecommendations();
  const yglHtml    = renderYGLSection();
  const heatHtml   = renderHeatTable(leads);
  const agentHtml  = renderAgentBreakdown(leads);
  const cardsHtml  = renderLeadCards(leads);
  const pageHtml   = renderPagination(leads.length);

  const locLeadCount = leads.filter(l => l.neighborhood).length;
  root.innerHTML = `
    ${statsHtml}
    ${recsHtml}
    <div class="two-col">
      <div class="heat-section">
        <div class="section-header">
          <span class="section-title">Lead Volume by Neighborhood & Beds</span>
          <span class="section-sub">${locLeadCount} of ${leads.length} leads have location</span>
        </div>
        ${heatHtml}
      </div>
      <div class="agent-section">
        <div class="section-header">
          <span class="section-title">By Agent</span>
        </div>
        ${agentHtml}
      </div>
    </div>
    ${yglHtml}
    <div class="cards-section">
      <div class="section-header">
        <span class="section-title">Lead Cards</span>
        <span class="section-sub">${leads.length} total · page ${currentPage}</span>
      </div>
      <div class="cards-list">${cardsHtml}</div>
      ${pageHtml}
    </div>`;
}

// ── Filter controls ───────────────────────────────────────────────────────────

function setDate(val) {
  currentDate = val;
  currentPage = 1;
  document.querySelectorAll('#dateButtons button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setBeds(val) {
  currentBeds = val;
  currentPage = 1;
  document.querySelectorAll('#bedButtons button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function goPage(n) {
  currentPage = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('public/data.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('data.json not found (HTTP ' + res.status + ')');
    const data = await res.json();

    allLeads = data.leads || [];
    allYGL   = data.yglListings || [];

    // Sync time
    if (data.generated) {
      const d = new Date(data.generated);
      document.getElementById('syncTime').textContent =
        'Last synced: ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
        ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    } else {
      document.getElementById('syncTime').textContent = 'Not yet synced';
    }

    // Populate agent dropdown
    const agentSel = document.getElementById('agentFilter');
    (data.agents || []).forEach(a => {
      const opt = document.createElement('option');
      opt.value = a; opt.textContent = a;
      agentSel.appendChild(opt);
    });
    agentSel.onchange = render;

    // Populate neighborhood dropdown
    const nbhdSel = document.getElementById('nbhdFilter');
    (data.neighborhoods || []).forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      nbhdSel.appendChild(opt);
    });
    nbhdSel.onchange = render;

    render();
  } catch (e) {
    document.getElementById('root').innerHTML =
      `<div class="empty" style="padding:60px;"><strong>No data yet.</strong><br><br>${e.message}<br><br>Run <code>node sync.js</code> locally or trigger the GitHub Actions workflow to populate data.</div>`;
  }
}

init();
</script>
