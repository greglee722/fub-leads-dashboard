<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advertising Report v0.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f9fc;
    --card: #ffffff;
    --border: #e4e9f1;
    --primary: #2055ea;
    --primary-light: #f0f4fe;
    --green: #0099a0;
    --green-light: #f0fffe;
    --green-border: #35d9da;
    --text: #1a2b3d;
    --muted: #64748b;
    --red: #e03545;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.02);
    --shadow-md: 0 4px 12px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.03);
    --radius: 12px;
    --font-display: 'Domine', Georgia, serif;
    --font-body: 'Nunito Sans', -apple-system, sans-serif;
    --transition: 200ms ease;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* SVG icon base */
  .icon { display: inline-block; width: 16px; height: 16px; vertical-align: -2px; flex-shrink: 0; }

  /* Header */
  .header { background: #173950; color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
  .version { background: rgba(255,255,255,.12); padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .3px; }
  .sync-time { font-size: 12px; color: rgba(255,255,255,.5); }

  /* Filters */
  .filters { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; white-space: nowrap; }
  .btn-group { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .btn-group button { background: var(--card); border: none; border-right: 1px solid var(--border); padding: 5px 12px; font-size: 12px; font-family: var(--font-body); font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all var(--transition); }
  .btn-group button:last-child { border-right: none; }
  .btn-group button:hover { background: var(--primary-light); color: var(--primary); }
  .btn-group button.active { background: var(--primary); color: #fff; }
  select { border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-family: var(--font-body); font-weight: 600; color: var(--text); background: var(--card); cursor: pointer; transition: border-color var(--transition); }
  select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(32,85,234,.1); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); }

  /* Main layout */
  .main { max-width: 1400px; margin: 0 auto; padding: 20px 28px; }

  /* Stats chips */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); border-left: 3px solid var(--primary); transition: box-shadow var(--transition); }
  .stat-card:hover { box-shadow: var(--shadow-md); }
  .stat-card .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
  .stat-card .value { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Recommendations */
  .recs-section { background: var(--green-light); border: 1px solid rgba(53,217,218,.3); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 20px; }
  .recs-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; letter-spacing: .1px; }
  .recs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .rec-card { background: #fff; border: 1px solid rgba(53,217,218,.25); border-radius: 10px; padding: 16px 18px; transition: box-shadow var(--transition), transform var(--transition); cursor: default; }
  .rec-card:hover { box-shadow: 0 4px 16px rgba(0,153,160,.08); transform: translateY(-1px); }
  .rec-rank { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .rec-main { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .rec-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .rec-action { font-size: 12px; font-weight: 700; color: var(--green); text-decoration: none; }
  .rec-action:hover { text-decoration: underline; }
  .recs-empty { font-size: 13px; color: var(--muted); }

  /* YGL inventory section */
  .ygl-section { background: #fffdf5; border: 1px solid rgba(242,188,68,.35); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 20px; }
  .ygl-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: #7a5800; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .ygl-sub { font-size: 12px; color: #9a6e00; margin-bottom: 12px; }
  .ygl-table { width: 100%; border-collapse: collapse; }
  .ygl-table th { padding: 8px 10px; font-size: 11px; font-weight: 700; color: #7a5800; text-align: center; background: #fff9e6; border-bottom: 1px solid rgba(242,188,68,.4); letter-spacing: .5px; text-transform: uppercase; }
  .ygl-table th:first-child { text-align: left; }
  .ygl-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid #fef6dc; text-align: center; transition: background var(--transition); }
  .ygl-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .ygl-table tr:hover td { background: #fff8dc; }
  .ygl-table tr:last-child td { border-bottom: none; }
  .ygl-cell { border-radius: 6px; padding: 3px 8px; display: inline-block; min-width: 32px; font-weight: 700; }
  .ygl-0 { color: #ccc; }
  .ygl-1 { background: #fff3cc; color: #7a5800; }
  .ygl-2 { background: #fcd34d; color: #6b4400; }
  .ygl-3 { background: #f2bc44; color: #fff; }
  .ygl-4 { background: #d4960a; color: #fff; }

  /* Price table */
  .price-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
  .price-table { width: 100%; border-collapse: collapse; }
  .price-table th { padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-align: center; background: #f0fffe; border-bottom: 1px solid rgba(53,217,218,.3); letter-spacing: .5px; text-transform: uppercase; }
  .price-table th:first-child { text-align: left; }
  .price-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #eef5fb; text-align: center; min-width: 80px; transition: background var(--transition); }
  .price-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .price-table tr:hover td { background: #f0fffe; }
  .price-table tr:last-child td { border-bottom: none; }
  .price-cell { font-weight: 700; color: var(--green); font-size: 13px; }
  .price-na { color: #ccc; font-size: 12px; }

  /* Move-in demand table */
  .movein-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
  .movein-table { width: 100%; border-collapse: collapse; }
  .movein-table th { padding: 10px 12px; font-size: 11px; font-weight: 700; color: #5b21b6; text-align: center; background: #f8f5ff; border-bottom: 1px solid #e9e0ff; letter-spacing: .5px; text-transform: uppercase; }
  .movein-table th:first-child { text-align: left; }
  .movein-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f0ecf9; text-align: center; min-width: 80px; vertical-align: top; transition: background var(--transition); }
  .movein-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .movein-table tr:hover td { background: #faf8ff; }
  .movein-table tr:last-child td { border-bottom: none; }
  .month-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin: 1px 2px; white-space: nowrap; }
  .month-sep { background: #fee2e2; color: #991b1b; }
  .month-aug { background: #fef3c7; color: #92400e; }
  .month-jul { background: #d1fae5; color: #065f46; }
  .month-jun { background: #dbeafe; color: #1e40af; }
  .month-other { background: #f3e8ff; color: #6b21a8; }
  .movein-empty { color: #cbd5e1; font-size: 12px; }
  .movein-note { padding: 10px 22px; font-size: 11px; color: var(--muted); border-top: 1px solid #f0ecf9; }

  /* View toggle */
  .view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .view-toggle button { background: var(--card); border: none; border-right: 1px solid var(--border); padding: 5px 14px; font-size: 12px; font-family: var(--font-body); font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all var(--transition); }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button:hover { background: var(--primary-light); color: var(--primary); }
  .view-toggle button.active { background: var(--primary); color: #fff; }

  /* Two-column layout */
  .two-col { display: grid; grid-template-columns: 1fr 360px; gap: 16px; margin-bottom: 20px; }

  /* Heat table */
  .heat-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .section-header { padding: 14px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--muted); }
  .heat-table { width: 100%; border-collapse: collapse; }
  .heat-table th { padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-align: center; background: #f8fafd; border-bottom: 1px solid var(--border); letter-spacing: .5px; text-transform: uppercase; }
  .heat-table th:first-child { text-align: left; }
  .heat-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f0f4f9; text-align: center; min-width: 70px; transition: background var(--transition); }
  .heat-table td:first-child { font-weight: 600; text-align: left; color: var(--text); }
  .heat-table tr:hover td { background: #f5f8fd; }
  .heat-table tr:last-child td { border-bottom: none; }
  .heat-cell { border-radius: 6px; padding: 4px 8px; display: inline-block; min-width: 36px; font-weight: 700; }
  .heat-0 { color: #c8d8e8; }
  .heat-1 { background: #dce8fd; color: #2055ea; }
  .heat-2 { background: #a3c1fa; color: #0f2e8a; }
  .heat-3 { background: #2055ea; color: #fff; }
  .heat-4 { background: #1644cc; color: #fff; }

  /* By-agent panel */
  .agent-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .agent-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid #f1f5f9; transition: background var(--transition); cursor: default; }
  .agent-row:hover { background: #f8fafd; }
  .agent-row:last-child { border-bottom: none; }
  .agent-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .agent-count { font-size: 13px; font-weight: 700; color: var(--primary); min-width: 24px; text-align: right; }
  .agent-bar-wrap { width: 80px; height: 5px; background: #edf2f7; border-radius: 3px; overflow: hidden; margin: 0 10px; }
  .agent-bar { height: 100%; background: linear-gradient(90deg, #2055ea, #35d9da); border-radius: 3px; }

  /* Lead cards */
  .cards-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .cards-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .lead-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; transition: all var(--transition); }
  .lead-card:hover { border-color: #c0d0e8; box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .lead-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .1px; }
  .badge-agent { background: #eef3fd; color: #2055ea; }
  .badge-nbhd { background: #e8fafa; color: #007a80; }
  .badge-beds { background: #f1f5f9; color: #506370; }
  .lead-date { font-size: 11px; color: var(--muted); margin-left: auto; }
  .lead-address { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .lead-price { font-size: 13px; color: var(--green); font-weight: 700; }
  .lead-name-text { font-size: 12px; color: var(--muted); }
  .lead-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .link-btn { font-size: 12px; font-weight: 700; font-family: var(--font-body); color: var(--primary); text-decoration: none; white-space: nowrap; padding: 6px 14px; border: 1.5px solid var(--primary); border-radius: 8px; transition: all var(--transition); cursor: pointer; }
  .link-btn:hover { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(32,85,234,.2); }

  /* Pagination */
  .pagination { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .page-info { font-size: 13px; color: var(--muted); }
  .page-btns { display: flex; gap: 4px; }
  .page-btns button { border: 1px solid var(--border); background: var(--card); padding: 5px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all var(--transition); }
  .page-btns button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .page-btns button:disabled { opacity: .35; cursor: default; }
  .page-btns button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Empty states */
  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); }

  /* Tablet */
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .recs-grid { grid-template-columns: 1fr; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .header { padding: 12px 14px; }
    .header h1 { font-size: 15px; }
    .header-left { gap: 8px; }
    .sync-time { display: none; }
    .filters { padding: 10px 14px; gap: 10px; }
    .filter-label { font-size: 9px; }
    .btn-group button { padding: 5px 9px; font-size: 11px; }
    .view-toggle button { padding: 5px 10px; font-size: 11px; }
    select { font-size: 11px; padding: 5px 8px; }
    .main { padding: 14px; }
    .stats-row { grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { padding: 14px 16px; }
    .stat-card .value { font-size: 24px; }
    .recs-section { padding: 14px; margin-bottom: 14px; }
    .recs-grid { grid-template-columns: 1fr; gap: 8px; }
    .rec-card { padding: 12px 14px; }
    .two-col { gap: 14px; margin-bottom: 14px; }
    .section-header { padding: 12px 14px; }
    .heat-section, .agent-section, .price-section, .movein-section, .cards-section, .ygl-section { overflow-x: auto; }
    .heat-table, .price-table, .movein-table, .ygl-table { min-width: 420px; }
    .heat-table td, .heat-table th { padding: 8px 8px; font-size: 12px; }
    .price-table td, .price-table th { padding: 8px 8px; font-size: 12px; }
    .ygl-table td, .ygl-table th { padding: 7px 8px; font-size: 12px; }
    .agent-row { padding: 9px 14px; }
    .cards-list { padding: 10px 12px; gap: 8px; }
    .lead-card { padding: 12px; grid-template-columns: 1fr; gap: 10px; }
    .lead-actions { flex-direction: row; align-items: center; }
    .lead-date { margin-left: 0; }
    .badge { font-size: 10px; padding: 2px 8px; }
    .pagination { padding: 10px 12px; }
    .empty { padding: 24px 14px; font-size: 13px; }
    .ygl-section { padding: 14px; }
  }

  /* Login overlay */
  #loginOverlay { display:flex; align-items:center; justify-content:center; position:fixed; inset:0; background:#173950; z-index:1000; }
  .login-card { background:var(--card); border-radius:14px; padding:44px 52px; text-align:center; max-width:400px; width:90%; box-shadow:0 24px 80px rgba(0,0,0,.35); border-top:4px solid #2055ea; }
  .login-card h2 { font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .login-card p { font-size:13px; color:var(--muted); margin-bottom:30px; letter-spacing:.2px; }
  .btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:11px 16px; background:#fff; border:1.5px solid var(--border); border-radius:8px; font-family:var(--font-body); font-size:14px; font-weight:700; color:var(--text); cursor:pointer; box-shadow:0 2px 8px rgba(23,57,80,.1); transition:border-color .15s, box-shadow .15s; }
  .btn-google:hover { border-color:#2055ea; box-shadow:0 4px 16px rgba(32,85,234,.15); }
  .login-error { margin-top:16px; font-size:12px; color:var(--red); }
  .btn-signout { background:rgba(255,255,255,.12); color:rgba(255,255,255,.85); border:1px solid rgba(255,255,255,.2); padding:5px 12px; border-radius:6px; font-family:var(--font-body); font-size:12px; cursor:pointer; }
  .btn-signout:hover { background:rgba(255,255,255,.22); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <div style="margin-bottom:10px;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2055ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
    <h2>Advertising Report</h2>
    <p>Internal admin access only</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <div id="loginError" class="login-error" style="display:none;">Your account is not authorized to access this dashboard.</div>
  </div>
</div>

<div id="app" style="display:none;">

<div class="header">
  <div class="header-left">
    <h1>Advertising Report</h1>
    <span class="version">v0.7</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="sync-time" id="syncTime">Loading...</span>
    <span id="userEmail" style="font-size:12px;color:rgba(255,255,255,.5);"></span>
    <button onclick="signOut()" class="btn-signout">Sign Out</button>
  </div>
</div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Date</span>
    <div class="btn-group" id="dateButtons">
      <button onclick="setDate('yesterday')" class="active">Yesterday</button>
      <button onclick="setDate('7d')">7 Days</button>
      <button onclick="setDate('30d')">30 Days</button>
      <button onclick="setDate('all')">All Time</button>
    </div>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Agent</span>
    <select id="agentFilter" onchange="render()">
      <option value="">All Agents</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Neighborhood</span>

// ── Dashboard ─────────────────────────────────────────────────────────────────

const PAGE_SIZE = 25;
let allLeads     = [];
let allYGL       = [];
let zillowPrices = {};
let currentDate = 'yesterday';
let currentBeds = null;
let currentPage = 1;
let currentView = 'dashboard';
let cardAgent = '';
let cardNbhd = '';
let cardBeds = '';

// ── Utilities ────────────────────────────────────────────────────────────────

function bedsLabel(beds) {
  if (beds === null || beds === undefined) return '?';
  if (beds === 0) return 'Studio';
  if (beds >= 3) return beds + 'BR+';
  return beds + 'BR';
}

function fmtPrice(price) {
  if (!price) return null;
  return '$' + price.toLocaleString() + '/mo';
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00'); // noon to avoid DST shifts
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function localDateStr(d) {
  // Use local calendar date (not UTC) to match Eastern-time lead dates
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function yesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return localDateStr(d);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return localDateStr(d);
}

function searchZillowUrl(address) {
  return 'https://www.google.com/search?q=' + encodeURIComponent((address || '') + ' zillow');
}

// ── Filtering ─────────────────────────────────────────────────────────────────

function getFilteredLeads() {
  const agentVal = document.getElementById('agentFilter').value;
  const nbhdVal  = document.getElementById('nbhdFilter').value;

  let minDate = null;
  if (currentDate === 'yesterday') minDate = yesterday();
  else if (currentDate === '7d') minDate = daysAgo(7);
  else if (currentDate === '30d') minDate = daysAgo(30);

  return allLeads.filter(l => {
    if (minDate && l.date < minDate) return false;
    if (currentDate === 'yesterday' && l.date !== yesterday()) return false;
    if (agentVal && l.agent !== agentVal) return false;
    if (nbhdVal && l.neighborhood !== nbhdVal) return false;
    if (currentBeds !== null) {
      if (currentBeds === 3) { if (l.beds === null || l.beds < 3) return false; }
      else { if (l.beds !== currentBeds) return false; }
    }
    return true;
  });
}

function getYesterdayLeads() {
  const yest = yesterday();
  return allLeads.filter(l => l.date === yest);
}

// ── Render ─────────────────────────────────────────────────────────────────────

function getLeadAvgPrice(neighborhood, beds) {
  const nbhd = (neighborhood || '').toLowerCase();
  const col = beds !== null ? BEDS_COLS.find(c => c.match(beds)) : null;
  const prices = allLeads
    .filter(l => {
      if (!l.address || !l.neighborhood) return false;
      const ln = l.neighborhood.toLowerCase();
      const nameMatch = ln === nbhd || ln.includes(nbhd) || nbhd.includes(ln);
      if (!nameMatch) return false;
      if (col && !col.match(l.beds)) return false;
      return true;
    })
    .map(l => zillowPrices[l.address]?.price)
    .filter(p => p != null);
  if (!prices.length) return null;
  return Math.round(prices.reduce((s, p) => s + p, 0) / prices.length);
}

function getTopRec() {
  const leads = getYesterdayLeads().filter(l => l.neighborhood);
  if (!leads.length) return null;
  const groups = {};
  leads.forEach(l => {
    const key = `${l.neighborhood}|${l.beds !== null ? l.beds : '?'}`;
    if (!groups[key]) groups[key] = { neighborhood: l.neighborhood, beds: l.beds, count: 0 };
    groups[key].count++;
  });
  const top = Object.values(groups).sort((a, b) => b.count - a.count)[0];
  if (!top) return null;
  top.price = getLeadAvgPrice(top.neighborhood, top.beds);
  return top;
}

function renderStats(leads) {
  const total = leads.length;
  const nbhds = {};
  leads.forEach(l => { if (l.neighborhood) nbhds[l.neighborhood] = (nbhds[l.neighborhood] || 0) + 1; });
  const topNbhd = Object.entries(nbhds).sort((a, b) => b[1] - a[1])[0];
  const topRec = getTopRec();
  const recPriceStr = topRec?.price ? ` · ${fmtPrice(topRec.price)}` : '';
  const recPriceSrc = topRec ? (topRec.price ? '<div style="font-size:10px;color:var(--muted);margin-top:2px;">Avg. Zillow listing price</div>' : '<div style="font-size:10px;color:var(--muted);margin-top:2px;">No price data available</div>') : '';

  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Leads</div>
        <div class="value">${total}</div>
        <div class="sub">${currentDate === 'yesterday' ? 'yesterday' : currentDate === '7d' ? 'last 7 days' : currentDate === '30d' ? 'last 30 days' : 'all time'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Top Neighborhood</div>
        <div class="value" style="font-size:18px;line-height:1.2;">${topNbhd ? topNbhd[0] : '—'}</div>
        <div class="sub">${topNbhd ? topNbhd[1] + ' leads' : 'no data'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Top Ad Recommendation</div>
        <div class="value" style="font-size:16px;line-height:1.2;">${topRec ? bedsLabel(topRec.beds) + ' in ' + topRec.neighborhood : '—'}</div>
        <div class="sub">${topRec ? topRec.count + ' lead' + (topRec.count !== 1 ? 's' : '') + ' yesterday' + recPriceStr : 'no data'}</div>
        ${recPriceSrc}
      </div>
    </div>`;
}

function renderRecommendations() {
  const leads = getYesterdayLeads();
  if (!leads.length) {
    return `<div class="recs-section">
      <div class="recs-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.7V17H8v-2.3A7 7 0 0 1 12 2z"/></svg> Recommended Ad Opportunities for Today</div>
      <div class="recs-empty">No leads found for yesterday. Check back after the next sync.</div>
    </div>`;
  }

  // Only use leads that have an actual neighborhood (listing-specific inquiries)
  const locLeads = leads.filter(l => l.neighborhood);

  if (!locLeads.length) {
    // No location data → fall back to top agents by volume
    const agentCounts = {};
    leads.forEach(l => { if (l.agent) agentCounts[l.agent] = (agentCounts[l.agent] || 0) + 1; });
    const topAgents = Object.entries(agentCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const agentCards = topAgents.map(([agent, count], i) => `
      <div class="rec-card">
        <div class="rec-rank">${['#1', '#2', '#3'][i]}</div>
        <div class="rec-main">${agent}</div>
        <div class="rec-sub">${count} lead${count !== 1 ? 's' : ''} yesterday</div>
        <span style="font-size:11px;color:var(--muted);">No listing data — general inquiry leads</span>
      </div>`).join('');
    return `<div class="recs-section">
      <div class="recs-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.7V17H8v-2.3A7 7 0 0 1 12 2z"/></svg> Yesterday's Lead Volume by Agent</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Neighborhood/beds data is only captured when a renter inquires on a specific Zillow listing. Yesterday's leads were general inquiries without listing data.</div>
      <div class="recs-grid">${agentCards}</div>
    </div>`;
  }

  // Has location data — show neighborhood × beds recommendations
  const groups = {};
  locLeads.forEach(l => {
    const key = `${l.neighborhood}|${l.beds !== null ? l.beds : '?'}`;
    if (!groups[key]) groups[key] = { neighborhood: l.neighborhood, beds: l.beds, count: 0 };
    groups[key].count++;
  });

  const sorted = Object.values(groups).sort((a, b) => b.count - a.count).slice(0, 3);
  const cards = sorted.map((g, i) => {
    const displayPrice = getLeadAvgPrice(g.neighborhood, g.beds);
    const label = ['#1 Pick', '#2 Pick', '#3 Pick'][i];
    const bedsStr = bedsLabel(g.beds);
    const priceStr = displayPrice ? ` · avg ${fmtPrice(displayPrice)}` : '';
    const priceSrc = displayPrice
      ? '<div style="font-size:10px;color:var(--muted);margin-top:4px;">Avg. Zillow listing price</div>'
      : '<div style="font-size:10px;color:var(--muted);margin-top:4px;">No price data available</div>';
    return `
      <div class="rec-card">
        <div class="rec-rank">${label}</div>
        <div class="rec-main">${bedsStr} in ${g.neighborhood}</div>
        <div class="rec-sub">${g.count} lead${g.count !== 1 ? 's' : ''} yesterday${priceStr}</div>
        ${priceSrc}
      </div>`;
  }).join('');

  return `<div class="recs-section">
    <div class="recs-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.7V17H8v-2.3A7 7 0 0 1 12 2z"/></svg> Recommended Ad Opportunities for Today</div>
    <div class="recs-grid">${cards}</div>
  </div>`;
}

const BEDS_COLS = [
  { key: 'studio', label: 'Studio', match: b => b === 0 },
  { key: '1br',    label: '1BR',    match: b => b === 1 },
  { key: '2br',    label: '2BR',    match: b => b === 2 },
  { key: '3br',    label: '3BR+',   match: b => b !== null && b >= 3 },
  // 'Unknown' beds column intentionally omitted — not actionable for ad targeting
];

function heatClass(count, max) {
  if (!count) return 'heat-0';
  const pct = max ? count / max : 0;
  if (pct < 0.2) return 'heat-1';
  if (pct < 0.5) return 'heat-2';
  if (pct < 0.8) return 'heat-3';
  return 'heat-4';
}

function yglHeatClass(count, max) {
  if (!count) return 'ygl-0';
  const pct = max ? count / max : 0;
  if (pct < 0.2) return 'ygl-1';
  if (pct < 0.5) return 'ygl-2';
  if (pct < 0.8) return 'ygl-3';
  return 'ygl-4';
}

function renderYGLSection() {
  if (!allYGL.length) return '';

  // Build neighborhood × beds matrix from YGL listings
  const matrix = {};
  let maxVal = 0;
  allYGL.forEach(l => {
    if (!l.neighborhood) return;
    if (!matrix[l.neighborhood]) matrix[l.neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(l.beds)) {
        matrix[l.neighborhood][col.key] = (matrix[l.neighborhood][col.key] || 0) + 1;
        maxVal = Math.max(maxVal, matrix[l.neighborhood][col.key]);
      }
    });
  });

  const nbhds = Object.keys(matrix).sort();
  if (!nbhds.length) return '';

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key]));
  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const cnt = matrix[n]?.[c.key] || 0;
      return `<td>${cnt ? `<span class="ygl-cell ${yglHeatClass(cnt, maxVal)}">${cnt}</span>` : '<span class="ygl-0">—</span>'}</td>`;
    }).join('');
    const total = cols.reduce((s, c) => s + (matrix[n]?.[c.key] || 0), 0);
    return `<tr><td>${n} <span style="color:var(--muted);font-weight:400;">(${total})</span></td>${cells}</tr>`;
  }).join('');

  const noFeeCount = allYGL.filter(l => l.fee === false || l.fee === 'No').length;
  const bostanOnly = allYGL.filter(l => l.neighborhood).length;

  return `<div class="ygl-section">
    <div class="ygl-title"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg> Available Inventory (YGL)</div>
    <div class="ygl-sub">${allYGL.length} on-market listings · ${bostanOnly} in Boston metro · ${noFeeCount} no-fee · updated at last sync</div>
    <table class="ygl-table">
      <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderHeatTable(leads) {
  const nbhds = [...new Set(leads.map(l => l.neighborhood).filter(Boolean))].sort();
  if (!nbhds.length) return '<div class="empty" style="padding:24px;">No neighborhood data for this date range.<br><span style="font-size:12px;">Location is only captured when a renter inquires on a specific Zillow listing.</span></div>';

  // Build count matrix
  const matrix = {};
  let maxVal = 0;
  leads.forEach(l => {
    if (!l.neighborhood) return;
    if (!matrix[l.neighborhood]) matrix[l.neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(l.beds)) {
        matrix[l.neighborhood][col.key] = (matrix[l.neighborhood][col.key] || 0) + 1;
        maxVal = Math.max(maxVal, matrix[l.neighborhood][col.key]);
      }
    });
  });

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key]));

  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const cnt = matrix[n]?.[c.key] || 0;
      return `<td>${cnt ? `<span class="heat-cell ${heatClass(cnt, maxVal)}">${cnt}</span>` : '<span class="heat-0">—</span>'}</td>`;
    }).join('');
    const total = cols.reduce((s, c) => s + (matrix[n]?.[c.key] || 0), 0);
    return `<tr><td>${n} <span style="color:var(--muted);font-weight:400;">(${total})</span></td>${cells}</tr>`;
  }).join('');

  return `<table class="heat-table">
    <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderPriceTable() {
  // Build neighborhood × beds average price grid from ALL leads (not date-filtered)
  // Dedupe by unique address so each listing is counted once
  const addrMap = {}; // address → { neighborhood, beds, price }
  allLeads.forEach(l => {
    if (!l.address || !l.neighborhood) return;
    const zp = zillowPrices[l.address];
    if (!zp || !zp.price) return;
    if (!addrMap[l.address]) {
      addrMap[l.address] = { neighborhood: l.neighborhood, beds: l.beds, price: zp.price };
    }
  });

  // Group by neighborhood × beds
  const matrix = {}; // neighborhood → bedsKey → [prices]
  Object.values(addrMap).forEach(({ neighborhood, beds, price }) => {
    if (!matrix[neighborhood]) matrix[neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(beds)) {
        if (!matrix[neighborhood][col.key]) matrix[neighborhood][col.key] = [];
        matrix[neighborhood][col.key].push(price);
      }
    });
  });

  const nbhds = Object.keys(matrix).sort();
  if (!nbhds.length) return '<div class="empty" style="padding:24px;">No Zillow price data available yet.</div>';

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key]?.length));
  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const prices = matrix[n]?.[c.key] || [];
      if (!prices.length) return '<td><span class="price-na">—</span></td>';
      const avg = Math.round(prices.reduce((s, p) => s + p, 0) / prices.length);
      return `<td><span class="price-cell">$${avg.toLocaleString()}</span><div style="font-size:10px;color:var(--muted);">${prices.length} listing${prices.length !== 1 ? 's' : ''}</div></td>`;
    }).join('');
    const allPrices = cols.flatMap(c => matrix[n]?.[c.key] || []);
    const totalAvg = allPrices.length ? Math.round(allPrices.reduce((s, p) => s + p, 0) / allPrices.length) : null;
    const avgStr = totalAvg ? `$${totalAvg.toLocaleString()}` : '—';
    return `<tr><td>${n} <span style="color:var(--muted);font-weight:400;">(${allPrices.length})</span></td>${cells}</tr>`;
  }).join('');

  const totalAddrs = Object.keys(addrMap).length;
  return `<div class="price-section">
    <div class="section-header" style="border-bottom-color:var(--green-border);">
      <span class="section-title" style="color:var(--green);">Avg. Rent Price by Neighborhood & Beds</span>
      <span class="section-sub">${totalAddrs} unique Zillow listings priced</span>
    </div>
    <table class="price-table">
      <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_CLASSES = { Jan:'month-other', Feb:'month-other', Mar:'month-other', Apr:'month-other',
  May:'month-other', Jun:'month-jun', Jul:'month-jul', Aug:'month-aug', Sep:'month-sep',
  Oct:'month-other', Nov:'month-other', Dec:'month-other' };

function renderMoveInTable(leads) {
  // Group by neighborhood × beds → move-in month counts
  const matrix = {}; // neighborhood → bedsKey → { month → count }
  let total = 0;
  leads.forEach(l => {
    if (!l.move_in || !l.neighborhood || l.beds === null || l.beds === undefined) return;
    const d = new Date(l.move_in + 'T12:00:00Z');
    if (isNaN(d.getTime())) return;
    const monthKey = MONTH_NAMES[d.getUTCMonth()];
    total++;
    if (!matrix[l.neighborhood]) matrix[l.neighborhood] = {};
    BEDS_COLS.forEach(col => {
      if (col.match(l.beds)) {
        if (!matrix[l.neighborhood][col.key]) matrix[l.neighborhood][col.key] = {};
        matrix[l.neighborhood][col.key][monthKey] = (matrix[l.neighborhood][col.key][monthKey] || 0) + 1;
      }
    });
  });

  const nbhds = Object.keys(matrix).sort();
  if (!nbhds.length) return '';

  const cols = BEDS_COLS.filter(c => nbhds.some(n => matrix[n]?.[c.key] && Object.keys(matrix[n][c.key]).length));
  const headers = cols.map(c => `<th>${c.label}</th>`).join('');

  const rows = nbhds.map(n => {
    const cells = cols.map(c => {
      const months = matrix[n]?.[c.key] || {};
      const sorted = Object.entries(months).sort((a, b) => MONTH_NAMES.indexOf(a[0]) - MONTH_NAMES.indexOf(b[0]));
      if (!sorted.length) return '<td><span class="movein-empty">—</span></td>';
      const tags = sorted.map(([m, cnt]) => `<span class="month-tag ${MONTH_CLASSES[m] || 'month-other'}">${m} ×${cnt}</span>`).join(' ');
      return `<td>${tags}</td>`;
    }).join('');
    return `<tr><td>${n}</td>${cells}</tr>`;
  }).join('');

  const withMoveIn = leads.filter(l => l.move_in).length;
  const pct = leads.length ? Math.round(withMoveIn / leads.length * 100) : 0;

  // Leads with move-in but no neighborhood — grouped by move-in month
  const unassigned = leads.filter(l => l.move_in && !l.neighborhood);
  let unassignedHtml = '';
  if (unassigned.length) {
    const byMonth = {};
    unassigned.forEach(l => {
      const d = new Date(l.move_in + 'T12:00:00Z');
      if (isNaN(d.getTime())) return;
      const key = MONTH_NAMES[d.getUTCMonth()];
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(l);
    });
    const sortedMonths = Object.keys(byMonth).sort((a, b) => MONTH_NAMES.indexOf(a) - MONTH_NAMES.indexOf(b));
    const groups = sortedMonths.map(m => {
      const cls = MONTH_CLASSES[m] || 'month-other';
      const leadRows = byMonth[m].map(l => {
        const fmtMoveIn = new Date(l.move_in + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const fubLink = l.fub_id ? `<a class="link-btn" href="https://app.followupboss.com/2/people/view/${l.fub_id}" target="_blank" style="font-size:11px;padding:3px 10px;">FUB →</a>` : '';
        return `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="flex:1;color:var(--text);font-weight:600;">${l.lead_name || '—'}</span>
          <span style="color:var(--muted);min-width:120px;">${l.agent || '—'}</span>
          <span style="color:var(--muted);min-width:100px;">${fmtMoveIn}</span>
          ${fubLink}
        </div>`;
      }).join('');
      return `<div style="margin-bottom:12px;">
        <div style="margin-bottom:6px;"><span class="month-tag ${cls}" style="font-size:12px;">${m} — ${byMonth[m].length} lead${byMonth[m].length !== 1 ? 's' : ''}</span></div>
        ${leadRows}
      </div>`;
    }).join('');
    unassignedHtml = `<div style="margin-top:16px;padding:16px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;">
      <div style="font-size:13px;font-weight:700;color:#7c3aed;margin-bottom:4px;">${unassigned.length} lead${unassigned.length !== 1 ? 's' : ''} with move-in but no property information</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4;">No property data found in FUB — may be a manual import. Verify in FUB.</div>
      ${groups}
    </div>`;
  }

  return `<div class="movein-section">
    <div class="section-header" style="border-bottom-color:#e9e0ff;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:4px;height:24px;background:#7c3aed;border-radius:2px;"></div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="section-title" style="color:#7c3aed;">Move-In Demand by Neighborhood & Beds</span>
      </div>
      <span class="section-sub">${total} leads with move-in date (${pct}% of filtered)</span>
    </div>
    <table class="movein-table">
      <thead><tr><th>Neighborhood</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="movein-note">Requested move-in months from Zillow lead inquiries. Colored by month.</div>
    ${unassignedHtml}
  </div>`;
}

function renderAgentBreakdown(leads) {
  const counts = {};
  leads.forEach(l => { if (l.agent) counts[l.agent] = (counts[l.agent] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const max = sorted[0]?.[1] || 1;

  if (!sorted.length) return '<div class="empty" style="padding:20px;">No agent data.</div>';

  return sorted.map(([agent, count]) => `
    <div class="agent-row">
      <span class="agent-name">${agent}</span>
      <div class="agent-bar-wrap"><div class="agent-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="agent-count">${count}</span>
    </div>`).join('');
}

function renderLeadCards(leads) {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = leads.slice(start, start + PAGE_SIZE);

  if (!page.length) return '<div class="empty">No leads match the current filters.</div>';

  return page.map(l => {
    const bedsStr = l.beds !== null ? bedsLabel(l.beds) : null;
    const priceStr = fmtPrice(l.price);
    const actionBtn = l.fub_id
      ? `<a class="link-btn" href="https://app.followupboss.com/2/people/view/${l.fub_id}" target="_blank">View in FUB →</a>`
      : '';

    return `
      <div class="lead-card">
        <div>
          <div class="lead-top">
            ${l.agent ? `<span class="badge badge-agent">${l.agent}</span>` : ''}
            ${l.neighborhood ? `<span class="badge badge-nbhd">${l.neighborhood}</span>` : ''}
            ${bedsStr ? `<span class="badge badge-beds">${bedsStr}</span>` : ''}
            <span class="lead-date">${fmtDate(l.date)}</span>
          </div>
          <div class="lead-address">${l.address || 'Address not available'}</div>
          <div style="display:flex;gap:12px;align-items:center;margin-top:3px;">
            ${priceStr ? `<span class="lead-price">${priceStr}</span>` : ''}
            ${l.lead_name ? `<span class="lead-name-text">${l.lead_name}</span>` : ''}
          </div>
        </div>
        <div class="lead-actions">${actionBtn}</div>
      </div>`;
  }).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) return '';

  const info = `${(currentPage - 1) * PAGE_SIZE + 1}–${Math.min(currentPage * PAGE_SIZE, total)} of ${total}`;
  const prev = `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
  const next = `<button onclick="goPage(${currentPage + 1})" ${currentPage >= pages ? 'disabled' : ''}>Next →</button>`;

  // Show up to 5 page buttons
  const pageNums = [];
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(pages, start + 4);
  for (let i = start; i <= end; i++) {
    pageNums.push(`<button onclick="goPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`);
  }

  return `<div class="pagination">
    <span class="page-info">${info}</span>
    <div class="page-btns">${prev}${pageNums.join('')}${next}</div>
  </div>`;
}

function renderNoAddressSection(leads, zillowLeads) {
  const noAddr = leads.filter(l => !l.address);
  if (!noAddr.length) return '';

  const rows = noAddr.map(l => {
    const fubLink = l.fub_id ? `<a class="link-btn" href="https://app.followupboss.com/2/people/view/${l.fub_id}" target="_blank" style="font-size:11px;padding:3px 10px;">FUB →</a>` : '';
    return `<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:12px;">
      <span style="color:var(--text);font-weight:600;flex:1;">${l.lead_name || '—'}</span>
      <span style="color:var(--muted);min-width:120px;">${l.agent || '—'}</span>
      <span style="color:var(--muted);min-width:90px;">${fmtDate(l.date)}</span>
      ${fubLink}
    </div>`;
  }).join('');

  return `<details style="margin-top:16px;" id="noAddrDetails">
    <summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px;">
      <span style="font-size:10px;">▶</span>
      ${noAddr.length} lead${noAddr.length !== 1 ? 's' : ''} excluded — no property information found
    </summary>
    <div style="margin-top:8px;padding:12px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-size:12px;">
      <div style="color:var(--muted);margin-bottom:10px;line-height:1.5;">
        No property information found for these leads. This typically means the renter contacted an agent through their Zillow profile without clicking a specific listing, or the lead was manually imported into FUB. Verify in FUB to confirm.
      </div>
      ${rows}
    </div>
  </details>`;
}

// ── Main render ───────────────────────────────────────────────────────────────

function render() {
  const leads = getFilteredLeads();
  const root  = document.getElementById('root');

  // YGL-only view
  if (currentView === 'ygl') {
    const yglHtml = renderYGLSection();
    root.innerHTML = yglHtml || '<div class="empty" style="padding:40px;">No YGL inventory data available. Data is fetched during daily sync.</div>';
    return;
  }

  // Dashboard view
  const statsHtml  = renderStats(leads);
  const recsHtml   = renderRecommendations();
  const priceHtml  = renderPriceTable();
  const moveinHtml = renderMoveInTable(leads);
  const heatHtml   = renderHeatTable(leads);
  const agentHtml  = renderAgentBreakdown(leads);
  const zillowLeads = leads.filter(l => l.address);

  // Card-specific filters
  let filteredCards = zillowLeads;
  if (cardAgent) filteredCards = filteredCards.filter(l => l.agent === cardAgent);
  if (cardNbhd) filteredCards = filteredCards.filter(l => l.neighborhood === cardNbhd);
  if (cardBeds) {
    const b = parseInt(cardBeds);
    if (b === 3) filteredCards = filteredCards.filter(l => l.beds !== null && l.beds >= 3);
    else filteredCards = filteredCards.filter(l => l.beds === b);
  }

  const cardsHtml  = renderLeadCards(filteredCards);
  const pageHtml   = renderPagination(filteredCards.length);

  // Build card filter dropdowns from available data
  const cardAgents = [...new Set(zillowLeads.map(l => l.agent).filter(Boolean))].sort();
  const cardNbhds = [...new Set(zillowLeads.map(l => l.neighborhood).filter(Boolean))].sort();
  const cardBedOpts = [...new Set(zillowLeads.map(l => l.beds).filter(b => b !== null))].sort((a, b) => a - b);

  const agentOpts = cardAgents.map(a => `<option value="${a}" ${cardAgent === a ? 'selected' : ''}>${a}</option>`).join('');
  const nbhdOpts = cardNbhds.map(n => `<option value="${n}" ${cardNbhd === n ? 'selected' : ''}>${n}</option>`).join('');
  const bedOpts = cardBedOpts.map(b => `<option value="${b}" ${cardBeds === String(b) ? 'selected' : ''}>${bedsLabel(b)}</option>`).join('');

  const cardFiltersHtml = `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
    <select onchange="setCardAgent(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card-bg);color:var(--text);cursor:pointer;">
      <option value="">All Agents</option>${agentOpts}
    </select>
    <select onchange="setCardNbhd(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card-bg);color:var(--text);cursor:pointer;">
      <option value="">All Neighborhoods</option>${nbhdOpts}
    </select>
    <select onchange="setCardBeds(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card-bg);color:var(--text);cursor:pointer;">
      <option value="">All Beds</option>${bedOpts}
    </select>
    ${(cardAgent || cardNbhd || cardBeds) ? `<button onclick="cardAgent='';cardNbhd='';cardBeds='';currentPage=1;render();" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card-bg);color:var(--muted);cursor:pointer;">Clear filters</button>` : ''}
  </div>`;

  const locLeadCount = leads.filter(l => l.neighborhood).length;
  root.innerHTML = `
    ${statsHtml}
    ${recsHtml}
    <div class="two-col">
      <div class="heat-section">
        <div class="section-header">
          <span class="section-title">Lead Volume by Neighborhood & Beds</span>
          <span class="section-sub">${locLeadCount} of ${leads.length} leads have location</span>
        </div>
        ${heatHtml}
      </div>
      <div class="agent-section">
        <div class="section-header">
          <span class="section-title">By Agent</span>
        </div>
        ${agentHtml}
      </div>
    </div>
    ${priceHtml}
    ${moveinHtml}
    <div class="cards-section">
      <div class="section-header">
        <span class="section-title">Lead Cards</span>
        <span class="section-sub">${filteredCards.length < zillowLeads.length ? `${filteredCards.length} of ${zillowLeads.length} filtered` : `${zillowLeads.length} total`} · page ${currentPage}</span>
      </div>
      ${cardFiltersHtml}
      <div class="cards-list">${cardsHtml}</div>
      ${pageHtml}
    </div>
    ${renderNoAddressSection(leads, zillowLeads)}`;
}

// ── Filter controls ───────────────────────────────────────────────────────────

function setDate(val) {
  currentDate = val;
  currentPage = 1;
  cardAgent = ''; cardNbhd = ''; cardBeds = '';
  document.querySelectorAll('#dateButtons button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setBeds(val) {
  currentBeds = val;
  currentPage = 1;
  document.querySelectorAll('#bedButtons button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setView(val) {
  currentView = val;
  currentPage = 1;
  document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setCardAgent(val) { cardAgent = val; currentPage = 1; render(); }
function setCardNbhd(val) { cardNbhd = val; currentPage = 1; render(); }
function setCardBeds(val) { cardBeds = val; currentPage = 1; render(); }

function goPage(n) {
  currentPage = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('public/data.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('data.json not found (HTTP ' + res.status + ')');
    const data = await res.json();

    allLeads     = data.leads || [];
    allYGL       = data.yglListings || [];
    zillowPrices = data.zillowPrices || {};

    // Sync time
    if (data.generated) {
      const d = new Date(data.generated);
      document.getElementById('syncTime').textContent =
        'Last synced: ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
        ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    } else {
      document.getElementById('syncTime').textContent = 'Not yet synced';
    }

    // Populate agent dropdown
    const agentSel = document.getElementById('agentFilter');
    (data.agents || []).forEach(a => {
      const opt = document.createElement('option');
      opt.value = a; opt.textContent = a;
      agentSel.appendChild(opt);
    });
    agentSel.onchange = render;

    // Populate neighborhood dropdown
    const nbhdSel = document.getElementById('nbhdFilter');
    (data.neighborhoods || []).forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      nbhdSel.appendChild(opt);
    });
    nbhdSel.onchange = render;

    render();
  } catch (e) {
    document.getElementById('root').innerHTML =
      `<div class="empty" style="padding:60px;"><strong>No data yet.</strong><br><br>${e.message}<br><br>Run <code>node sync.js</code> locally or trigger the GitHub Actions workflow to populate data.</div>`;
  }
}

checkAuth();
</script>
</body>
</html>
